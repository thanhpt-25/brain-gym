

services:
  postgres:
    image: postgres:16-alpine
    container_name: braingym-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-braingym}
      POSTGRES_USER: ${POSTGRES_USER:-braingym}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-braingym_dev_2024}
    ports:
      - '${POSTGRES_PORT:-5432}:${POSTGRES_PORT:-5432}'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U braingym']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: braingym-redis
    ports:
      - '${REDIS_PORT:-6379}:${REDIS_PORT:-6379}'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: braingym-backend
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-braingym}:${POSTGRES_PASSWORD:-braingym_dev_2024}@postgres:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-braingym}?schema=public"
      REDIS_HOST: "redis"
      REDIS_PORT: ${REDIS_PORT:-6379}
      JWT_SECRET: "${JWT_SECRET:-braingym-jwt-secret-change-in-production}"
      JWT_EXPIRES_IN: "${JWT_EXPIRES_IN:-15m}"
      JWT_REFRESH_SECRET: "${JWT_REFRESH_SECRET:-braingym-refresh-secret-change-in-production}"
      JWT_REFRESH_EXPIRES_IN: "${JWT_REFRESH_EXPIRES_IN:-7d}"
      PORT: ${PORT:-3000}
      NODE_ENV: ${NODE_ENV:-production}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "3000"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: braingym-frontend
    expose:
      - "80"

  nginx:
    image: nginx:stable-alpine
    container_name: braingym-nginx
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
  redis_data:
