version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: braingym-postgres
    environment:
      POSTGRES_DB: braingym
      POSTGRES_USER: braingym
      POSTGRES_PASSWORD: braingym_dev_2024
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U braingym']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: braingym-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: braingym-backend
    environment:
      DATABASE_URL: "postgresql://braingym:braingym_dev_2024@postgres:5432/braingym?schema=public"
      REDIS_HOST: "redis"
      REDIS_PORT: 6379
      JWT_SECRET: "braingym-jwt-secret-change-in-production"
      JWT_EXPIRES_IN: "15m"
      JWT_REFRESH_SECRET: "braingym-refresh-secret-change-in-production"
      JWT_REFRESH_EXPIRES_IN: "7d"
      PORT: 3000
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "3000"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: braingym-frontend
    expose:
      - "80"

  nginx:
    image: nginx:stable-alpine
    container_name: braingym-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
  redis_data:
