name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

concurrency:
  group: deploy-${{ github.ref }}-${{ github.event.inputs.environment || 'staging' }}
  cancel-in-progress: false

env:
  NODE_VERSION: '20'
  AWS_REGION: us-east-1

jobs:
  # Determine which environment to deploy to
  setup:
    name: Setup
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.env.outputs.environment }}
      image-tag: ${{ github.sha }}
    steps:
      - id: env
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "environment=${{ github.event.inputs.environment }}" >> $GITHUB_OUTPUT
          else
            echo "environment=staging" >> $GITHUB_OUTPUT
          fi

  # Build and push backend Docker image to ECR
  build-push-backend:
    name: Build & Push Backend
    needs: setup
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    environment: ${{ needs.setup.outputs.environment }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region ${{ env.AWS_REGION }} | \
            docker login --username AWS --password-stdin ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/braingym-backend:${{ needs.setup.outputs.image-tag }}
            ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/braingym-backend:latest
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

  # Run database migrations
  migrate-db:
    name: Migrate Database
    needs: [setup, build-push-backend]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    environment: ${{ needs.setup.outputs.environment }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Run migrations
        run: |
          # Run one-off ECS task to execute migrations
          TASK_ARN=$(aws ecs run-task \
            --cluster braingym-${{ needs.setup.outputs.environment }} \
            --task-definition braingym-backend-migrate:1 \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[${{ secrets.AWS_PRIVATE_SUBNET_IDS }}],securityGroups=[${{ secrets.AWS_ECS_SECURITY_GROUP }}]}" \
            --overrides containerOverrides="[{name=braingym-backend,image=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/braingym-backend:${{ needs.setup.outputs.image-tag }},command=[\"sh\",\"docker-entrypoint.sh\",\"migrate\"]}]" \
            --query 'tasks[0].taskArn' \
            --output text)

          echo "Started migration task: $TASK_ARN"

          # Wait for task to complete with timeout of 5 minutes
          TIMEOUT=300
          ELAPSED=0
          while [ $ELAPSED -lt $TIMEOUT ]; do
            STATUS=$(aws ecs describe-tasks \
              --cluster braingym-${{ needs.setup.outputs.environment }} \
              --tasks $TASK_ARN \
              --query 'tasks[0].lastStatus' \
              --output text)

            if [ "$STATUS" == "STOPPED" ]; then
              EXIT_CODE=$(aws ecs describe-tasks \
                --cluster braingym-${{ needs.setup.outputs.environment }} \
                --tasks $TASK_ARN \
                --query 'tasks[0].containers[0].exitCode' \
                --output text)

              if [ "$EXIT_CODE" == "0" ]; then
                echo "✓ Migration succeeded"
                exit 0
              else
                echo "✗ Migration failed with exit code $EXIT_CODE"
                exit 1
              fi
            fi

            echo "Task status: $STATUS... ($(($ELAPSED / 10))s elapsed)"
            sleep 10
            ELAPSED=$(($ELAPSED + 10))
          done

          echo "✗ Migration task timeout after ${TIMEOUT}s"
          exit 1

  # Deploy backend to ECS
  deploy-backend:
    name: Deploy Backend
    needs: [setup, migrate-db]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    environment: ${{ needs.setup.outputs.environment }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update ECS service
        run: |
          aws ecs update-service \
            --cluster braingym-${{ needs.setup.outputs.environment }} \
            --service braingym-backend \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}

      - name: Wait for service stability
        run: |
          aws ecs wait services-stable \
            --cluster braingym-${{ needs.setup.outputs.environment }} \
            --services braingym-backend \
            --region ${{ env.AWS_REGION }}

          echo "✓ Backend deployment successful"

  # Build and deploy frontend to S3 + CloudFront
  deploy-frontend:
    name: Deploy Frontend
    needs: setup
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    environment: ${{ needs.setup.outputs.environment }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Build frontend
        run: npm install --legacy-peer-deps && npm run build
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}

      - name: Deploy to S3
        run: |
          aws s3 sync dist/ s3://${{ secrets.AWS_S3_BUCKET }}/ \
            --delete \
            --cache-control "public, max-age=31536000" \
            --exclude "index.html"

          aws s3 cp dist/index.html s3://${{ secrets.AWS_S3_BUCKET }}/index.html \
            --cache-control "public, max-age=3600" \
            --content-type "text/html"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.AWS_CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"

          echo "✓ Frontend deployment successful"

  # Smoke test (basic health check)
  smoke-test:
    name: Smoke Test
    needs: [setup, deploy-backend, deploy-frontend]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    environment: ${{ needs.setup.outputs.environment }}
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Health check
        run: |
          # Get ALB or CloudFront endpoint
          ENDPOINT=${{ secrets.DEPLOYMENT_ENDPOINT }}

          echo "Testing endpoint: $ENDPOINT"

          # Wait for endpoint to be ready
          for i in {1..30}; do
            if curl -sf "$ENDPOINT/health" > /dev/null 2>&1 || curl -sf "$ENDPOINT/api/v1/health" > /dev/null 2>&1; then
              echo "✓ Health check passed"
              exit 0
            fi
            echo "Attempt $i/30... waiting for endpoint"
            sleep 5
          done

          echo "✗ Health check failed"
          exit 1

  # Notify deployment status
  notify:
    name: Notify
    runs-on: ubuntu-latest
    if: always()
    needs: [setup, deploy-backend, deploy-frontend, smoke-test]
    steps:
      - name: Check deployment status
        run: |
          if [ "${{ needs.deploy-backend.result }}" == "success" ] && [ "${{ needs.deploy-frontend.result }}" == "success" ] && [ "${{ needs.smoke-test.result }}" == "success" ]; then
            echo "✓ Deployment to ${{ needs.setup.outputs.environment }} succeeded"
            exit 0
          else
            echo "✗ Deployment to ${{ needs.setup.outputs.environment }} failed"
            exit 1
          fi
